name: Deploy
on:
  push:
    tags: ['v*']

jobs:
  deploy:
    name: Deploy
    runs-on: 'ubuntu-latest'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: |
            25
            21
      - uses: gradle/actions/wrapper-validation@v6
      - uses: gradle/actions/setup-gradle@v6
      - name: Build
        run: ./gradlew publishToSonatype closeAndReleaseSonatypeStagingRepository --stacktrace
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
          ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}
      - name: Get tag name
        id: get_tag
        shell: bash
        run: |
          tag_name="$(echo $GITHUB_REF | cut -d / -f 3)"
          echo "tag=$tag_name" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: MC-Machinations/auto-release-changelog@v1.1.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: 'Release ${{ steps.get_tag.outputs.tag }}'
          files: |
            hypo-asm/build/libs/*.jar
            hypo-asm/hypo-asm-hydrate/build/libs/*.jar
            hypo-core/build/libs/*.jar
            hypo-hydrate/build/libs/*.jar
            hypo-mappings/build/libs/*.jar
            hypo-model/build/libs/*.jar
            hypo-types/build/libs/*.jar
