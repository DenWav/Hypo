name: Test
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Test
    runs-on: 'ubuntu-latest'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: |
            25
            21
      - uses: gradle/actions/wrapper-validation@v6
      - uses: gradle/actions/setup-gradle@v6
      - name: Build
        run: ./gradlew build --stacktrace
